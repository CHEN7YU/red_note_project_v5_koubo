<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TikTok Cover v2 — Minimal</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:32px;
    background:#111;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  }

  .card{
    width:1080px;
    height:1920px;
    margin:32px auto;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(circle at 80% 15%, rgba(255,59,48,.12), transparent 24%),
      radial-gradient(circle at 15% 85%, rgba(77,163,255,.10), transparent 22%),
      linear-gradient(180deg, #0b0e14 0%, #07090d 100%);
    color:#fff;
    border:1px solid rgba(255,255,255,.04);
  }

  .safe{
    position:absolute;
    inset:110px 90px 150px 90px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  /* ─── Cover A: 最短 ─── */
  .cover-a .title{
    font-size:128px;
    line-height:1.05;
    font-weight:950;
    letter-spacing:-0.04em;
    margin:0;
  }
  .cover-a .accent{ color:#ff3b30; }

  /* ─── Cover B: 加一行小字 ─── */
  .cover-b .title{
    font-size:118px;
    line-height:1.06;
    font-weight:950;
    letter-spacing:-0.04em;
    margin:0;
  }
  .cover-b .accent{ color:#ff3b30; }
  .cover-b .sub{
    margin-top:40px;
    font-size:46px;
    font-weight:700;
    color:rgba(255,255,255,.5);
  }

  /* ─── Cover C: 纯一句 ─── */
  .cover-c .title{
    font-size:108px;
    line-height:1.1;
    font-weight:950;
    letter-spacing:-0.04em;
    margin:0;
    text-align:center;
  }
  .cover-c .accent{ color:#ff7a00; }
  .cover-c .safe{ align-items:center; }
</style>
</head>
<body>

<!-- Cover A — 两行，最冲击 -->
<div class="card cover-a" id="cover-a">
  <div class="safe">
    <h1 class="title">
      AI is replacing<br>the <span class="accent">bottom rung</span>
    </h1>
  </div>
</div>

<!-- Cover B — 加一行解释 -->
<div class="card cover-b" id="cover-b">
  <div class="safe">
    <h1 class="title">
      AI is replacing<br>the <span class="accent">bottom rung</span>
    </h1>
    <div class="sub">Not firing seniors. Just not hiring juniors.</div>
  </div>
</div>

<!-- Cover C — 换一个角度 -->
<div class="card cover-c" id="cover-c">
  <div class="safe">
    <h1 class="title">
      Entry-level jobs<br>killed by <span class="accent">AI</span>
    </h1>
  </div>
</div>

</body>
</html>
